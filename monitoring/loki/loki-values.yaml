deploymentMode: SingleBinary

image:
  repository: grafana/loki
  tag: 2.9.4

serviceAccount:
  create: true

loki:
  auth_enabled: false
  analytics:
    reporting_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: boltdb-shipper
        object_store: filesystem
        schema: v12
        index:
          prefix: loki_index_
          period: 24h
  compactor:
    working_directory: /data/loki/compactor
    shared_store: filesystem
  ruler:
    storage:
      type: local
      local:
        directory: /data/loki/rules
    alertmanager_url: http://alertmanager:9093

ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_block_size: 262144

readinessProbe:
  httpGet:
    path: /ready
    port: http-metrics
  initialDelaySeconds: 30
  periodSeconds: 10

config:
  limits_config:
    ingestion_rate_mb: 8
    ingestion_burst_size_mb: 16
    max_entries_limit_per_query: 5000
  chunk_store_config:
    max_look_back_period: 720h
  table_manager:
    retention_deletes_enabled: true
    retention_period: 720h

persistence:
  enabled: true
  size: 20Gi

service:
  type: ClusterIP
  port: 3100

gateway:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: true
  dashboards:
    enabled: true

rbac:
  create: true

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    positions:
      filename: /var/log/positions.yaml
    snippets:
      pipelineStages:
        - cri: {}
        - labeldrop:
            - filename
            - stream
